<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة قفزة الكلب</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container glass">
        <!-- زر تبديل اللغة -->
        <div class="language-switcher">
            <button id="langToggle" class="lang-btn" title="English / العربية">🌐</button>
        </div>

        <h1 id="game-title">🎮 لعبة قفزة الكلب</h1>
        
        <!-- لوحة اللعب -->
        <div class="board" id="board"></div>
        
        <!-- أزرار وضع اللعبة -->
        <div class="setup-mode">
            <button id="classicSetupBtn" class="setup-btn active">
                <span class="icon">🎲</span>
                <span class="btn-text" id="setup-classic-text">وضع كلاسيكي</span>
            </button>
            <button id="droppingSetupBtn" class="setup-btn">
                <span class="icon">📥</span>
                <span class="btn-text" id="setup-dropping-text">وضع حديث</span>
            </button>
        </div>

        <div class="game-mode">
            <button id="pvpBtn" class="mode-btn active">
                <span class="icon">👥</span>
                <span class="btn-text" id="mode-pvp-text">لاعب ضد لاعب</span>
            </button>
            <button id="pvcBtn" class="mode-btn">
                <span class="icon">🤖</span>
                <span class="btn-text" id="mode-pvc-text">لاعب ضد كمبيوتر</span>
            </button>
        </div>

        <!-- خيار اختيار اللون (يظهر فقط في وضع pvc) -->
        <div class="color-choice" id="colorChoice" style="display: none;">
            <span id="choose-color-label">اختر لونك:</span>
            <button id="chooseRed" class="color-btn red" data-color="red">
                <span class="stone player1-stone"></span> <span id="color-red-text">أحمر</span>
            </button>
            <button id="chooseBlue" class="color-btn blue" data-color="blue">
                <span class="stone player2-stone"></span> <span id="color-blue-text">أزرق</span>
            </button>
        </div>

        <!-- شريط الحالة -->
        <div class="status-bar">
            <div class="player-info player1-info">
                <span class="stone player1-stone"></span>
                <span id="player1-count">12</span>
            </div>
            <div id="turn-indicator">🔴 دور الأحمر</div>
            <div class="player-info player2-info">
                <span class="stone player2-stone"></span>
                <span id="player2-count">12</span>
            </div>
        </div>
       
        <!-- حاوية الأزرار السفلية -->
        <div class="action-buttons">
            <button id="resetBtn">
                <span class="icon">🔄</span>
                <span class="btn-text" id="reset-text">لعبة جديدة</span>
            </button>
            <button id="aboutBtn">
                <span class="icon">ℹ️</span>
                <span class="btn-text" id="about-text">من نحن</span>
            </button>
            <button id="muteBtn">
                <span class="icon">🔊</span>
                <span class="btn-text" id="mute-text">كتم الصوت</span>
            </button>
        </div>

        <!-- نافذة من نحن المنبثقة -->
        <div id="aboutModal" class="modal">
            <div class="modal-content glass">
                <span class="close-btn">&times;</span>
                <h2 id="about-title">معلومات المطور</h2>
                <p><strong id="about-name-label">الاسم:</strong> <span id="about-name">altulsy</span></p>
                <p><strong id="about-email-label">البريد الإلكتروني:</strong> <a href="mailto:altulsy@gmail.com" id="about-email">altulsy@gmail.com</a></p>
            </div>
        </div>

        <!-- رسالة الفوز -->
        <div id="winner-message" class="winner"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
